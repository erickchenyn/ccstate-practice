# Lefthook 配置文件
# 文档: https://github.com/evilmartians/lefthook

# 在 pre-commit 阶段运行的钩子
pre-commit:
    parallel: true
    commands:
        # 1. 验证配置一致性（最重要，优先级最高）
        validate-config:
            tags: config validation
            run: node scripts/validate-config.js
            fail_text: '❌ EditorConfig 和 Prettier 配置不一致！请修复后重新提交。'

        # 2. 检查代码格式
        format-check:
            tags: formatting
            run: pnpm run format:check
            fail_text: "❌ 代码格式不符合规范！运行 'pnpm run format' 修复后重新提交。"

        # 3. Oxlint 检查（快速 lint）
        oxlint:
            tags: linting
            run: pnpm run oxlint
            fail_text: "❌ Oxlint 检查失败！运行 'pnpm run oxlint:fix' 修复后重新提交。"

        # 4. ESLint 检查（详细 lint）
        lint:
            tags: linting
            run: pnpm run lint
            fail_text: "❌ ESLint 检查失败！运行 'pnpm run lint:fix' 修复后重新提交。"

        # 5. TypeScript 类型检查
        type-check:
            tags: types
            run: pnpm run type-check
            fail_text: '❌ TypeScript 类型检查失败！请修复类型错误后重新提交。'

        # 6. 运行测试（允许没有测试文件）
        test:
            tags: testing
            run: pnpm run test:run || (echo "⚠️ 没有找到测试文件，跳过测试检查" && exit 0)
            fail_text: '❌ 测试失败！请修复失败的测试后重新提交。'

# 在 pre-push 阶段运行的钩子（可选，更严格的检查）
pre-push:
    commands:
        # 1. 验证配置一致性（最重要，优先级最高）
        validate-config:
            tags: config validation
            run: node scripts/validate-config.js
            fail_text: '❌ EditorConfig 和 Prettier 配置不一致！请修复后重新提交。'

        # 2. 检查代码格式
        format-check:
            tags: formatting
            run: pnpm run format:check
            fail_text: "❌ 代码格式不符合规范！运行 'pnpm run format' 修复后重新提交。"

        # 3. Oxlint 检查（快速 lint）
        oxlint:
            tags: linting
            run: pnpm run oxlint
            fail_text: "❌ Oxlint 检查失败！运行 'pnpm run oxlint:fix' 修复后重新提交。"

        # 4. ESLint 检查（详细 lint）
        lint:
            tags: linting
            run: pnpm run lint
            fail_text: "❌ ESLint 检查失败！运行 'pnpm run lint:fix' 修复后重新提交。"

        # 5. TypeScript 类型检查
        type-check:
            tags: types
            run: pnpm run type-check
            fail_text: '❌ TypeScript 类型检查失败！请修复类型错误后重新提交。'

        # 6. 运行测试（允许没有测试文件）
        test:
            tags: testing
            run: pnpm run test:run || (echo "⚠️ 没有找到测试文件，跳过测试检查" && exit 0)
            fail_text: '❌ 测试失败！请修复失败的测试后重新提交。'

# 在 commit-msg 阶段验证提交信息
commit-msg:
    commands:
        # 使用 commitlint 检查提交信息格式
        commitlint:
            tags: commit message
            run: pnpm run commitlint --edit {1}
            fail_text: '❌ 提交信息格式不符合规范。'

# 跳过某些钩子的配置（用于紧急情况）
skip_output:
    - meta
    - summary

# 输出配置
output:
    - summary
    - success
    - failure
